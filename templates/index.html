{% extends 'base.html' %}

{% block content %}
<h1>Listado de Productos</h1>

<a href="/create" class="btn btn-success mb-3">nuevo registro</a>

<table class="table">
    <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Categoria</th>
            <th>Precio</th>
            <th>Stock</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for producto in productos%}
        <tr>
            <td>{{ producto.id }}</td>
            <td>{{ producto.nombre }}</td>
            <td>{{ producto.categoria }}</td>
            <td>{{ producto.precio }}</td>
            <td>{{ producto.stock }}</td>
            <td><a href="/edit/{{ producto.id }}" class="btn btn-warning">Editar</a></td>
            <td><a href="/delete/{{ producto.id }}" class="btn btn-danger" onclick="return(confirm('Estas seguro de Eliminar??'))">Eliminar</a></td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
